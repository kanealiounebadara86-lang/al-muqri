name: apprendre_coran
description: Apprendre Coran - Application complète d'apprentissage

publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Audio
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # HTTP
  dio: ^5.4.3

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Utils
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  speech_to_text: ^7.0.0
  url_launcher: ^6.2.5
  path_provider: ^2.1.4
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/


  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700